include classpath("application.conf") // Inclui configurações padrão

node-address {
  protocol = "http"
  host = "*" // Ouve em todas as interfaces dentro do container
  port = 9324
  context-path = ""
}

rest-sqs {
  enabled = true
  bind-port = 9324
  bind-hostname = "0.0.0.0" // Necessário para acessar de fora do container
  sqs-limits = strict
}

// Filas a serem criadas na inicialização
queues {
  transaction-queue {
    defaultVisibilityTimeout = 30 seconds // Tempo que a mensagem fica invisível após ser lida
    delay = 0 seconds                     // Atraso para novas mensagens
    receiveMessageWait = 0 seconds        // Desabilita long-polling por padrão aqui
    // Você pode adicionar configurações de Dead Letter Queue (DLQ) aqui depois, se precisar
    // deadLettersQueue {
    //   name = "transaction-queue-dlq"
    //   maxReceiveCount = 5 // Exemplo: 5 tentativas antes de ir para DLQ
    // }
  }
  // Se usar DLQ, defina a fila DLQ também:
  // transaction-queue-dlq { }
}

// Habilita uma interface web simples para visualizar as filas (opcional)
rest-stats {
  enabled = true
  bind-port = 9325
  bind-hostname = "0.0.0.0"
}
